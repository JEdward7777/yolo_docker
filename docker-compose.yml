services:
  code-server:
    build: .
    image: custom-stateful-code-server:latest
    container_name: code-server-agent-${AGENT_ID:-1}
    user: root
    privileged: true # CRITICAL: Allows the container to execute the internal mount commands
    ports:
      - "${PORT:-8443}:8443"
    environment:
      - PASSWORD=a2s47df8
      - SUDO_PASSWORD=potato
    volumes:
      # A single volume handles the entire stateful OS layer for this agent.
      # Mounted at /persist; entrypoint.sh overlays the whole root onto it so all
      # runtime writes (apt installs, /usr/local, /root, /config, ...) persist.
      # Each agent runs under its own compose project (agent1, agent2, ...), so
      # the volume below is namespaced per project (e.g. agent1_agent-root) and
      # is therefore fully isolated from every other agent.
      - agent-root:/persist
    restart: unless-stopped

volumes:
  # The persistent root for this agent. The real volume name is prefixed with
  # the compose project name (e.g. agent1_agent-root, agent2_agent-root).
  agent-root:
